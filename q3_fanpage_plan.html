{date:'2026-08-05',s:'AM',type:'EDU',h:'1ms vs 4ms Response Time – Sự khác biệt có thực sự quan trọng?',c:`📚 Test thực tế: Mắt người có phân biệt được không?

⏱️ 1ms GtG (Grey to Grey)
→ Đây là con số marketing
→ Đo trong điều kiện lý tưởng

⏱️ 4ms GtG  
→ Thực tế vẫn rất nhanh
→ Mắt người thường không phân biệt được 1ms vs 4ms

⚠️ Quan trọng hơn: MPRT (Moving Picture Response Time)
→ Đo ghosting trong chuyển động thực
→ 1ms MPRT = ít ghosting hơn đáng kể

✅ Kết luận: 4ms GtG + 1ms MPRT > 1ms GtG không có MPRT

ViewSonic công bố cả GtG và MPRT — minh bạch với người dùng.

#ViewSonicVietnam #EDU #ResponseTime #GtG #MPRT`},

// ===== STATE & RENDERING =====
let doneSet = new Set(JSON.parse(localStorage.getItem('vs_done')||'[]'));
let currentFilter = 'ALL';

function saveState(){localStorage.setItem('vs_done',JSON.stringify([...doneSet]));}

function formatDate(d){
  const dt=new Date(d+'T00:00:00');
  const days=['CN','T2','T3','T4','T5','T6','T7'];
  return `${days[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}`;
}

function getMonth(d){return parseInt(d.split('-')[1]);}

function buildFilterBar(){
  const bar=document.getElementById('filterBar');
  const filters=[{k:'ALL',label:'Tất cả'},...Object.entries(TYPES).map(([k,v])=>({k,label:v.label})),{k:'DONE',label:'Đã đăng'}];
  bar.innerHTML=filters.map(f=>`<button class="filter-btn${currentFilter===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.label}</button>`).join('');
}

function setFilter(k){currentFilter=k;buildFilterBar();renderContent();}

function updateStats(){
  const total=S.length, done=doneSet.size;
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
  const counts={};
  S.forEach(p=>counts[p.type]=(counts[p.type]||0)+1);
  const today=new Date().toISOString().split('T')[0];
  const todayPosts=S.filter(p=>p.date===today).length;
  document.getElementById('statsRow').innerHTML=
    `<div class="stat">✅ ${done}/${total} bài</div>`+
    `<div class="stat">📅 Hôm nay: ${todayPosts} bài</div>`+
    Object.entries(counts).map(([k,v])=>`<div class="stat" style="background:${TYPES[k].color}33">${TYPES[k].label}: ${v}</div>`).join('');
}

function renderContent(){
  const today=new Date().toISOString().split('T')[0];
  let filtered=S;
  if(currentFilter==='DONE') filtered=S.filter(p=>doneSet.has(p.date+p.s));
  else if(currentFilter!=='ALL') filtered=S.filter(p=>p.type===currentFilter);

  if(filtered.length===0){
    document.getElementById('content').innerHTML='<div class="no-results">Không có bài nào phù hợp.</div>';
    return;
  }

  // Group by month then week
  const months={7:{name:'Tháng 7 – Gaming Season 🎮',weeks:{}},8:{name:'Tháng 8 – Work Smart 💼',weeks:{}},9:{name:'Tháng 9 – Back to School 📚',weeks:{}}};
  
  filtered.forEach(p=>{
    const m=getMonth(p.date);
    const dt=new Date(p.date+'T00:00:00');
    const weekStart=new Date(dt);
    weekStart.setDate(dt.getDate()-dt.getDay()+1);
    const wk=weekStart.toISOString().split('T')[0];
    if(!months[m]) return;
    if(!months[m].weeks[wk]) months[m].weeks[wk]=[];
    months[m].weeks[wk].push(p);
  });

  let html='';
  [7,8,9].forEach(m=>{
    const mo=months[m];
    const weekKeys=Object.keys(mo.weeks).sort();
    if(weekKeys.length===0) return;
    html+=`<div class="month-section"><div class="month-title">${mo.name}</div>`;
    weekKeys.forEach(wk=>{
      const posts=mo.weeks[wk].sort((a,b)=>a.date.localeCompare(b.date)||(a.s==='AM'?-1:1));
      const wdt=new Date(wk+'T00:00:00');
      html+=`<div class="week-group"><div class="week-label">Tuần ${wdt.getDate()}/${wdt.getMonth()+1}</div><div class="posts-grid">`;
      posts.forEach(p=>{
        const id=p.date+p.s;
        const done=doneSet.has(id);
        const isToday=p.date===today;
        html+=`<div class="post-card type-${p.type}${done?' done':''}${isToday?' today':''}" id="card-${id}">
          <div class="card-header">
            <span class="type-dot dot-${p.type}"></span>
            <span class="type-label label-${p.type}">${TYPES[p.type].label}</span>
            <span class="session-badge ${p.s==='AM'?'badge-am':'badge-pm'}">${p.s}</span>
          </div>
          <div class="post-date">${formatDate(p.date)}</div>
          <div class="post-headline">${p.h}</div>
          <div class="post-content" id="content-${id}">${p.c.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div class="card-actions">
            <button class="btn-sm btn-expand" onclick="toggleContent('${id}')">👁 Xem</button>
            <button class="btn-sm btn-copy" onclick="copyPost('${id}')">📋 Copy</button>
            <button class="btn-sm btn-done" onclick="toggleDone('${id}')">${done?'↩ Bỏ':'✓ Đã đăng'}</button>
          </div>
        </div>`;
      });
      html+='</div></div>';
    });
    html+='</div>';
  });

  document.getElementById('content').innerHTML=html;
}

function toggleContent(id){
  const el=document.getElementById('content-'+id);
  el.classList.toggle('expanded');
}

function copyPost(id){
  const p=S.find(x=>x.date+x.s===id);
  if(!p) return;
  navigator.clipboard.writeText(p.h+'\n\n'+p.c).then(()=>{
    const btn=event.target;
    btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy',1500);
  });
}

function toggleDone(id){
  if(doneSet.has(id)) doneSet.delete(id);
  else doneSet.add(id);
  saveState();
  document.getElementById('card-'+id)?.classList.toggle('done');
  const btn=document.querySelector(`#card-${id} .btn-done`);
  if(btn) btn.textContent=doneSet.has(id)?'↩ Bỏ':'✓ Đã đăng';
  updateStats();
}

// INIT
buildFilterBar();
renderContent();
updateStats();
</script>
